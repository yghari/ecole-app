<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centre d'Apprentissage - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f13;
            color: #f0f0f5;
        }
        header {
            background: #1e1e28;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2e2e3e;
        }
        h1 { color: #f5a623; font-size: 24px; }
        .btn {
            padding: 8px 16px;
            background: #f5a623;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-secondary {
            background: #2e2e3e;
            color: white;
            margin-left: 10px;
        }
        .stats-bar {
            display: flex;
            gap: 16px;
            padding: 20px 32px;
            background: #17171f;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #1e1e28;
            border: 1px solid #2e2e3e;
            border-radius: 12px;
            padding: 15px 20px;
            min-width: 140px;
            text-align: center;
        }
        .stat-card .label { font-size: 11px; color: #7a7a9a; }
        .stat-card .value { font-size: 28px; font-weight: bold; color: #f5a623; }
        .tabs {
            display: flex;
            gap: 4px;
            padding: 0 32px;
            background: #0f0f13;
            border-bottom: 1px solid #2e2e3e;
        }
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: #7a7a9a;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: #f5a623;
            border-bottom-color: #f5a623;
        }
        .panel { display: none; padding: 20px 32px; }
        .panel.active { display: block; }
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-box {
            background: #1e1e28;
            border: 1px solid #2e2e3e;
            border-radius: 8px;
            padding: 8px 14px;
            color: white;
            flex: 1;
            min-width: 200px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #2e2e3e;
        }
        th { color: #7a7a9a; font-size: 11px; }
        .user-badge {
            background: #2e2e3e;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 15px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #7a7a9a;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>🎓 Centre d'Apprentissage</h1>
            <p id="schoolInfo" style="font-size: 12px; color: #7a7a9a; margin-top: 5px;"></p>
        </div>
        <div>
            <span id="userInfo" class="user-badge"></span>
            <button class="btn btn-secondary" id="logoutBtn">Déconnexion</button>
            <button class="btn" id="addStudentBtn">+ Ajouter Élève</button>
        </div>
    </header>

    <div class="stats-bar" id="statsBar">
        <div class="stat-card"><div class="label">Total Élèves</div><div class="value">0</div></div>
        <div class="stat-card"><div class="label">Montant Reçu</div><div class="value">0 DH</div></div>
        <div class="stat-card"><div class="label">Reste à Percevoir</div><div class="value">0 DH</div></div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="students">📚 Élèves</button>
        <button class="tab" data-tab="books">📖 Livres</button>
        <button class="tab" data-tab="classes">🏫 Classes</button>
    </div>

    <div id="studentsPanel" class="panel active">
        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="Rechercher un élève...">
            <select id="classFilter" class="search-box" style="width: auto;">
                <option value="all">Toutes les classes</option>
            </select>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>#</th><th>Nom</th><th>Classe</th><th>Payé</th><th>Reste</th><th>Actions</th></tr></thead>
                <tbody id="studentsList"></tbody>
            </table>
            <div id="studentsEmpty" class="empty-state">Aucun élève</div>
        </div>
    </div>

    <div id="booksPanel" class="panel">
        <div class="controls">
            <input type="text" id="bookSearch" class="search-box" placeholder="Rechercher un livre...">
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>#</th><th>Titre</th><th>Classe</th><th>Type</th><th>Quantité</th><th>Dispo</th></tr></thead>
                <tbody id="booksList"></tbody>
            </table>
        </div>
    </div>

    <div id="classesPanel" class="panel">
        <div class="table-wrap">
            <table>
                <thead><tr><th>#</th><th>Classe</th><th>Niveau</th><th>Élèves</th></tr></thead>
                <tbody id="classesList"></tbody>
            </table>
        </div>
    </div>

    <div id="toast" style="position:fixed;bottom:20px;right:20px;background:#2ecc71;color:#000;padding:10px 20px;border-radius:8px;display:none;"></div>

    <script>
        // Get current user from session
        let currentUser = null;
        let students = [];
        let books = [];
        let classes = [];
        
        // Load user
        function loadUser() {
            const userJson = sessionStorage.getItem('currentUser');
            if (!userJson) {
                window.location.href = 'index.html';
                return false;
            }
            currentUser = JSON.parse(userJson);
            document.getElementById('userInfo').innerHTML = `👤 ${currentUser.name} (${currentUser.role})`;
            
            let schoolName = '';
            if (currentUser.school === 'L1') schoolName = 'École Primaire L1';
            else if (currentUser.school === 'L2') schoolName = 'Collège L2';
            else if (currentUser.school === 'L3') schoolName = 'Lycée L3';
            else schoolName = 'Toutes les écoles';
            document.getElementById('schoolInfo').innerHTML = schoolName;
            
            return true;
        }
        
        // Initialize data for the school
        function initData() {
            const prefix = currentUser.school || 'global';
            const savedStudents = localStorage.getItem(`${prefix}_students`);
            const savedBooks = localStorage.getItem(`${prefix}_books`);
            const savedClasses = localStorage.getItem(`${prefix}_classes`);
            
            if (savedStudents) students = JSON.parse(savedStudents);
            else students = [];
            
            if (savedBooks) books = JSON.parse(savedBooks);
            else {
                // Default books based on school
                const schoolClasses = getSchoolClasses();
                books = [];
                schoolClasses.forEach((className, idx) => {
                    books.push({ id: idx+1, title: `Manuel ${className}`, class: className, type: 'Manuel', quantity: 30, available: 30 });
                    books.push({ id: idx+100, title: `Cahier ${className}`, class: className, type: 'Cahier', quantity: 30, available: 30 });
                });
            }
            
            if (savedClasses) classes = JSON.parse(savedClasses);
            else {
                classes = getSchoolClasses().map((name, idx) => ({ id: idx+1, name: name, level: getLevel(name) }));
            }
            
            saveData();
            renderAll();
        }
        
        function getSchoolClasses() {
            if (currentUser.school === 'L1') return ['CP', 'CE1', 'CE2', 'CM1', 'CM2'];
            if (currentUser.school === 'L2') return ['CP', 'CE1', 'CE2', 'CM1', 'CM2', '6ème', '5ème', '4ème', '3ème'];
            if (currentUser.school === 'L3') return ['6ème', '5ème', '4ème', '3ème', '2nde', '1ère', 'Tle'];
            return ['CP', 'CE1', 'CE2', 'CM1', 'CM2', '6ème', '5ème', '4ème', '3ème', '2nde', '1ère', 'Tle'];
        }
        
        function getLevel(className) {
            const primary = ['CP', 'CE1', 'CE2', 'CM1', 'CM2'];
            const college = ['6ème', '5ème', '4ème', '3ème'];
            if (primary.includes(className)) return 'Primaire';
            if (college.includes(className)) return 'Collège';
            return 'Lycée';
        }
        
        function saveData() {
            const prefix = currentUser.school || 'global';
            localStorage.setItem(`${prefix}_students`, JSON.stringify(students));
            localStorage.setItem(`${prefix}_books`, JSON.stringify(books));
            localStorage.setItem(`${prefix}_classes`, JSON.stringify(classes));
        }
        
        function renderAll() {
            renderStats();
            renderStudents();
            renderBooks();
            renderClasses();
            renderClassFilter();
        }
        
        function renderStats() {
            const total = students.length;
            const totalPaid = students.reduce((s, a) => s + (a.paid || 0), 0);
            const totalRemaining = students.reduce((s, a) => s + (a.remaining || 0), 0);
            document.getElementById('statsBar').innerHTML = `
                <div class="stat-card"><div class="label">Total Élèves</div><div class="value">${total}</div></div>
                <div class="stat-card"><div class="label">Montant Reçu</div><div class="value">${totalPaid} DH</div></div>
                <div class="stat-card"><div class="label">Reste à Percevoir</div><div class="value">${totalRemaining} DH</div></div>
            `;
        }
        
        function renderStudents() {
            const tbody = document.getElementById('studentsList');
            if (students.length === 0) {
                document.getElementById('studentsEmpty').style.display = 'block';
                tbody.innerHTML = '';
            } else {
                document.getElementById('studentsEmpty').style.display = 'none';
                tbody.innerHTML = students.map((s, i) => `
                    <tr>
                        <td>${i+1}</td>
                        <td>${s.name}</td>
                        <td>${s.class}</td>
                        <td>${s.paid || 0} DH</td>
                        <td>${s.remaining || 0} DH</td>
                        <td>
                            <button onclick="deleteStudent(${s.id})" style="background:#e74c3c;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;">🗑️</button>
                        </td>
                    </tr>
                `).join('');
            }
        }
        
        function renderBooks() {
            const tbody = document.getElementById('booksList');
            if (books.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Aucun livre</td></tr>';
            } else {
                tbody.innerHTML = books.map((b, i) => `
                    <tr>
                        <td>${i+1}</td>
                        <td>${b.title}</td>
                        <td>${b.class}</td>
                        <td>${b.type}</td>
                        <td>${b.quantity}</td>
                        <td>${b.available}</td>
                    </tr>
                `).join('');
            }
        }
        
        function renderClasses() {
            const tbody = document.getElementById('classesList');
            if (classes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Aucune classe</td></tr>';
            } else {
                const studentCount = (className) => students.filter(s => s.class === className).length;
                tbody.innerHTML = classes.map((c, i) => `
                    <tr>
                        <td>${i+1}</td>
                        <td>${c.name}</td>
                        <td>${c.level}</td>
                        <td>${studentCount(c.name)}</td>
                    </tr>
                `).join('');
            }
        }
        
        function renderClassFilter() {
            const uniqueClasses = [...new Set(students.map(s => s.class))];
            const filter = document.getElementById('classFilter');
            filter.innerHTML = '<option value="all">Toutes les classes</option>' + 
                uniqueClasses.map(c => `<option value="${c}">${c}</option>`).join('');
        }
        
        // CRUD Functions
        window.addStudent = function() {
            const name = prompt('Nom de l\'élève:');
            if (!name) return;
            const className = prompt('Classe:');
            if (!className) return;
            const paid = parseFloat(prompt('Montant payé (DH):', '0')) || 0;
            const remaining = parseFloat(prompt('Reste à payer (DH):', '0')) || 0;
            
            const newStudent = {
                id: Date.now(),
                name: name,
                class: className,
                phone: '',
                delivery: '',
                paid: paid,
                remaining: remaining,
                remarks: '',
                books: []
            };
            students.push(newStudent);
            saveData();
            renderAll();
            showToast('Élève ajouté');
        };
        
        window.deleteStudent = function(id) {
            if (confirm('Supprimer cet élève ?')) {
                students = students.filter(s => s.id !== id);
                saveData();
                renderAll();
                showToast('Élève supprimé');
            }
        };
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}Panel`).classList.add('active');
            };
        });
        
        // Event listeners
        document.getElementById('addStudentBtn').onclick = addStudent;
        document.getElementById('logoutBtn').onclick = () => {
            sessionStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        };
        document.getElementById('searchInput').oninput = function() {
            const term = this.value.toLowerCase();
            const tbody = document.getElementById('studentsList');
            const filtered = students.filter(s => s.name.toLowerCase().includes(term));
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Aucun résultat</td></tr>';
            } else {
                tbody.innerHTML = filtered.map((s, i) => `
                    <tr>
                        <td>${i+1}</td>
                        <td>${s.name}</td>
                        <td>${s.class}</td>
                        <td>${s.paid || 0} DH</td>
                        <td>${s.remaining || 0} DH</td>
                        <td><button onclick="deleteStudent(${s.id})" style="background:#e74c3c;border:none;padding:5px 10px;border-radius:5px;">🗑️</button></td>
                    </tr>
                `).join('');
            }
        };
        
        // Initialize
        if (loadUser()) {
            initData();
        }
    </script>
</body>
</html>
