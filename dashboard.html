<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Centre d'Apprentissage | Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #0a0c12;
            color: #eef2ff;
        }
        .app-header {
            background: rgba(15, 17, 25, 0.95);
            backdrop-filter: blur(16px);
            padding: 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2f3f;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo-area h2 {
            color: #f5a623;
            font-size: 1.5rem;
        }
        .logo-area p {
            font-size: 0.7rem;
            color: #9aa4bf;
        }
        .user-panel {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .badge {
            background: #1e2436;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
        }
        button, .btn-like {
            background: #2e3a55;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }
        button.primary {
            background: #f5a623;
            color: #0a0c12;
        }
        button.primary:hover { background: #ffbc4a; transform: translateY(-1px);}
        button.outline {
            background: transparent;
            border: 1px solid #4a5568;
        }
        button.danger {
            background: #c0392b;
        }
        button.success {
            background: #27ae60;
        }
        .stats-grid {
            display: flex;
            gap: 1rem;
            padding: 1.5rem 2rem;
            flex-wrap: wrap;
            background: #0c0f17;
        }
        .stat-card {
            background: #161c2a;
            border-radius: 1.5rem;
            padding: 1rem 1.8rem;
            flex: 1;
            min-width: 120px;
            text-align: center;
            border-bottom: 2px solid #f5a623;
            cursor: pointer;
            transition: 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); background: #1e2538; }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #f5a623;
        }
        .stat-number.green { color: #2ecc71; }
        .stat-number.red { color: #e74c3c; }
        .tabs {
            display: flex;
            gap: 0.2rem;
            padding: 0 2rem;
            background: #0a0c12;
            border-bottom: 1px solid #252c3c;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 0.8rem 1.8rem;
            font-weight: 600;
            color: #9aa4bf;
            cursor: pointer;
        }
        .tab-btn.active {
            color: #f5a623;
            border-bottom: 2px solid #f5a623;
        }
        .panel {
            display: none;
            padding: 1.8rem 2rem;
            animation: fade 0.2s ease;
        }
        .panel.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .toolbar {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            align-items: center;
        }
        .search-input, .filter-select {
            background: #11151f;
            border: 1px solid #2e3a55;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            color: white;
        }
        .search-input { flex: 1; min-width: 200px; }
        .filter-select { min-width: 150px; cursor: pointer; }
        .table-wrap {
            overflow-x: auto;
            border-radius: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #0f1119;
        }
        th, td {
            padding: 0.9rem 0.8rem;
            text-align: left;
            border-bottom: 1px solid #202634;
        }
        th { color: #b9c3e0; font-size: 0.7rem; text-transform: uppercase; }
        tbody tr:hover { background: #161c2a; }
        .class-chip {
            background: #1e2a3a;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            display: inline-block;
        }
        .badge-paid { background: #1f4f2d; color: #a3e9b4; padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.7rem; }
        .badge-unpaid { background: #631d1d; color: #ffb3b3; padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.7rem; }
        .lowstock { color: #ff8888; font-weight: bold; }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.open { display: flex; }
        .modal-card {
            background: #141c2c;
            max-width: 600px;
            width: 90%;
            border-radius: 2rem;
            padding: 1.8rem;
            border: 1px solid #3a4460;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-card h3 { color: #f5a623; margin-bottom: 1rem; }
        .form-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .form-field { flex: 1; }
        .form-field label { font-size: 0.7rem; display: block; margin-bottom: 0.3rem; color: #b9c3e0; text-transform: uppercase; }
        .form-field input, .form-field select, .form-field textarea {
            width: 100%;
            background: #0a0e18;
            border: 1px solid #2e3a55;
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            color: white;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            max-height: 200px;
            overflow-y: auto;
            background: #0a0e18;
            padding: 0.7rem;
            border-radius: 1rem;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.6rem;
            background: #11151f;
            border-radius: 2rem;
            cursor: pointer;
        }
        .checkbox-item input { cursor: pointer; }
        .toast-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: #000;
            padding: 0.7rem 1.2rem;
            border-radius: 3rem;
            z-index: 1100;
            display: none;
            font-weight: 500;
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #6c757d;
        }
        .count-label {
            color: #9aa4bf;
            font-size: 0.8rem;
            margin-left: auto;
        }
        .action-btns {
            display: flex;
            gap: 0.4rem;
        }
        .btn-icon {
            background: #2e3a55;
            padding: 0.3rem 0.7rem;
            border-radius: 1.5rem;
            font-size: 0.8rem;
        }
        .status-warning { color: #f5a623; }
        .status-success { color: #2ecc71; }
        @media (max-width: 700px) {
            .stats-grid { padding: 1rem; gap: 0.6rem;}
            .panel { padding: 1rem; }
            .tabs { padding: 0 1rem; }
            .app-header { padding: 0.8rem 1rem; }
        }
    </style>
</head>
<body>
    <div id="appContainer"></div>
    <div id="toastMsg" class="toast-msg"></div>

    <script>
        // ============================================
        // SCHOOL CONFIGURATIONS
        // ============================================
        const SCHOOLS = {
            L1: { name: '🏫 École Primaire L1', levels: ['CP', 'CE1', 'CE2', 'CM1', 'CM2'] },
            L2: { name: '🏫 Collège L2', levels: ['CP', 'CE1', 'CE2', 'CM1', 'CM2', '6ème', '5ème', '4ème', '3ème'] },
            L3: { name: '🏫 Lycée L3', levels: ['6ème', '5ème', '4ème', '3ème', '2nde', '1ère', 'Tle'] }
        };

        const BOOK_TYPES = ['Manuel', 'Cahier', 'Exercice', 'Livre de lecture', 'Guide pédagogique'];

        // ============================================
        // CHECK AUTHENTICATION
        // ============================================
        let currentUser = null;
        const savedUser = sessionStorage.getItem('currentUser');
        if (!savedUser) {
            window.location.href = 'index.html';
        } else {
            currentUser = JSON.parse(savedUser);
        }

        // ============================================
        // DATA STORAGE HELPERS
        // ============================================
        function getStoragePrefix() {
            if (currentUser.role === 'admin') return 'global';
            return currentUser.school;
        }

        function getDefaultClasses() {
            if (currentUser.role === 'admin') {
                return [...SCHOOLS.L1.levels, ...SCHOOLS.L2.levels, ...SCHOOLS.L3.levels].filter((v,i,a)=>a.indexOf(v)===i);
            }
            return SCHOOLS[currentUser.school]?.levels || [];
        }

        function detectLevel(className) {
            if (['CP','CE1','CE2','CM1','CM2'].includes(className)) return 'Primaire';
            if (['6ème','5ème','4ème','3ème'].includes(className)) return 'Collège';
            if (['2nde','1ère','Tle'].includes(className)) return 'Lycée';
            return 'Autre';
        }

        let state = {
            students: [],
            books: [],
            classes: [],
            orders: [],
            history: []
        };
        let currentFilter = 'all';
        let editingStudentId = null;
        let editingBookId = null;
        let editingClassId = null;

        // ============================================
        // PERSISTENCE
        // ============================================
        function loadData() {
            const prefix = getStoragePrefix();
            state.students = JSON.parse(localStorage.getItem(`${prefix}_students`) || '[]');
            state.books = JSON.parse(localStorage.getItem(`${prefix}_books`) || '[]');
            state.classes = JSON.parse(localStorage.getItem(`${prefix}_classes`) || '[]');
            state.orders = JSON.parse(localStorage.getItem(`${prefix}_orders`) || '[]');
            state.history = JSON.parse(localStorage.getItem(`${prefix}_history`) || '[]');

            if (state.classes.length === 0) {
                state.classes = getDefaultClasses().map((name, idx) => ({ id: idx + 1, name, level: detectLevel(name) }));
            }
            if (state.books.length === 0 && state.classes.length) {
                state.classes.forEach((cls, idx) => {
                    state.books.push({ id: idx * 100 + 1, title: `Manuel ${cls.name}`, class: cls.name, type: 'Manuel', quantity: 30, available: 30, price: 150 });
                    state.books.push({ id: idx * 100 + 2, title: `Cahier ${cls.name}`, class: cls.name, type: 'Cahier', quantity: 30, available: 30, price: 50 });
                });
            }
            saveData();
        }

        function saveData() {
            const prefix = getStoragePrefix();
            localStorage.setItem(`${prefix}_students`, JSON.stringify(state.students));
            localStorage.setItem(`${prefix}_books`, JSON.stringify(state.books));
            localStorage.setItem(`${prefix}_classes`, JSON.stringify(state.classes));
            localStorage.setItem(`${prefix}_orders`, JSON.stringify(state.orders));
            localStorage.setItem(`${prefix}_history`, JSON.stringify(state.history));
        }

        function addToHistory(bookTitle, action, quantity, studentName = null, details = null) {
            state.history.unshift({
                id: Date.now(),
                date: new Date().toLocaleString(),
                bookTitle: bookTitle,
                action: action,
                quantity: quantity,
                studentName: studentName,
                details: details
            });
            if (state.history.length > 200) state.history.pop();
            saveData();
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toastMsg');
            toast.textContent = msg;
            toast.style.background = isError ? '#c0392b' : '#2ecc71';
            toast.style.color = isError ? 'white' : 'black';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
        }

        // ============================================
        // ADVANCED STUDENT CRUD WITH MODAL
        // ============================================
        function openStudentModal(studentId = null) {
            editingStudentId = studentId;
            const student = studentId ? state.students.find(s => s.id === studentId) : null;
            
            document.getElementById('modalStudentTitle').innerText = student ? '✏️ Modifier Élève' : '➕ Ajouter un Élève';
            document.getElementById('studentName').value = student?.name || '';
            document.getElementById('studentClass').value = student?.class || '';
            document.getElementById('studentPhone').value = student?.phone || '';
            document.getElementById('studentDelivery').value = student?.delivery || '';
            document.getElementById('studentPaid').value = student?.paid || 0;
            document.getElementById('studentRemaining').value = student?.remaining || 0;
            document.getElementById('studentRemarks').value = student?.remarks || '';
            
            // Populate class dropdown
            const classSelect = document.getElementById('studentClass');
            classSelect.innerHTML = '<option value="">-- Sélectionner --</option>' + 
                state.classes.map(c => `<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)} (${c.level})</option>`).join('');
            if (student?.class) classSelect.value = student.class;
            
            // Populate books checklist
            const booksContainer = document.getElementById('studentBooksList');
            const studentBooks = student?.books || [];
            booksContainer.innerHTML = state.books.map(book => `
                <label class="checkbox-item">
                    <input type="checkbox" value="${escapeHtml(book.title)}" data-book-id="${book.id}" ${studentBooks.includes(book.title) ? 'checked' : ''}>
                    ${escapeHtml(book.title)} (${book.class}) - stock: ${book.available}
                </label>
            `).join('');
            
            document.getElementById('studentModal').classList.add('open');
        }

        function closeStudentModal() {
            document.getElementById('studentModal').classList.remove('open');
            editingStudentId = null;
        }

        function saveStudentFromModal() {
            const name = document.getElementById('studentName').value.trim();
            if (!name) { showToast('Le nom est obligatoire', true); return; }
            
            const selectedBooks = [];
            document.querySelectorAll('#studentBooksList input:checked').forEach(cb => {
                selectedBooks.push(cb.value);
            });
            
            const studentData = {
                name: name,
                class: document.getElementById('studentClass').value,
                phone: document.getElementById('studentPhone').value,
                delivery: document.getElementById('studentDelivery').value,
                paid: parseFloat(document.getElementById('studentPaid').value) || 0,
                remaining: parseFloat(document.getElementById('studentRemaining').value) || 0,
                remarks: document.getElementById('studentRemarks').value,
                books: selectedBooks
            };
            
            if (editingStudentId) {
                const index = state.students.findIndex(s => s.id === editingStudentId);
                if (index !== -1) {
                    const oldBooks = state.students[index].books || [];
                    // Return old books to stock
                    oldBooks.forEach(bookTitle => {
                        const book = state.books.find(b => b.title === bookTitle);
                        if (book) {
                            book.available = (book.available || 0) + 1;
                            addToHistory(bookTitle, 'retour', 1, name, 'Modification élève');
                        }
                    });
                    // Assign new books
                    selectedBooks.forEach(bookTitle => {
                        const book = state.books.find(b => b.title === bookTitle);
                        if (book && !oldBooks.includes(bookTitle)) {
                            book.available = (book.available || 0) - 1;
                            addToHistory(bookTitle, 'attribution', -1, name, 'Nouveau livre attribué');
                        }
                    });
                    state.students[index] = { ...state.students[index], ...studentData };
                    showToast('Élève modifié ✅');
                }
            } else {
                // New student - decrease stock for assigned books
                selectedBooks.forEach(bookTitle => {
                    const book = state.books.find(b => b.title === bookTitle);
                    if (book && book.available > 0) {
                        book.available = (book.available || 0) - 1;
                        addToHistory(bookTitle, 'attribution', -1, name, 'Nouvel élève');
                    } else if (book) {
                        showToast(`⚠️ Stock insuffisant pour "${bookTitle}"`, true);
                    }
                });
                studentData.id = Date.now();
                state.students.push(studentData);
                showToast('Élève ajouté ✅');
            }
            
            saveData();
            closeStudentModal();
            renderDashboard();
        }

        // ============================================
        // BOOK CRUD WITH MODAL
        // ============================================
        function openBookModal(bookId = null) {
            editingBookId = bookId;
            const book = bookId ? state.books.find(b => b.id === bookId) : null;
            
            document.getElementById('modalBookTitle').innerText = book ? '✏️ Modifier Livre' : '➕ Ajouter un Livre';
            document.getElementById('bookTitle').value = book?.title || '';
            document.getElementById('bookClass').value = book?.class || '';
            document.getElementById('bookType').value = book?.type || 'Manuel';
            document.getElementById('bookQuantity').value = book?.quantity || 0;
            document.getElementById('bookAvailable').value = book?.available || 0;
            document.getElementById('bookPrice').value = book?.price || 0;
            
            // Populate class dropdown
            const classSelect = document.getElementById('bookClass');
            classSelect.innerHTML = '<option value="">-- Sélectionner --</option>' + 
                state.classes.map(c => `<option value="${escapeHtml(c.name)}">${escapeHtml(c.name)}</option>`).join('');
            if (book?.class) classSelect.value = book.class;
            
            document.getElementById('bookModal').classList.add('open');
        }

        function closeBookModal() {
            document.getElementById('bookModal').classList.remove('open');
            editingBookId = null;
        }

        function saveBookFromModal() {
            const title = document.getElementById('bookTitle').value.trim();
            if (!title) { showToast('Le titre est obligatoire', true); return; }
            
            const bookData = {
                title: title,
                class: document.getElementById('bookClass').value,
                type: document.getElementById('bookType').value,
                quantity: parseInt(document.getElementById('bookQuantity').value) || 0,
                available: parseInt(document.getElementById('bookAvailable').value) || 0,
                price: parseFloat(document.getElementById('bookPrice').value) || 0
            };
            
            if (editingBookId) {
                const index = state.books.findIndex(b => b.id === editingBookId);
                if (index !== -1) {
                    state.books[index] = { ...state.books[index], ...bookData };
                    showToast('Livre modifié ✅');
                }
            } else {
                bookData.id = Date.now();
                state.books.push(bookData);
                addToHistory(bookData.title, 'ajout', bookData.quantity, null, 'Nouveau livre ajouté');
                showToast('Livre ajouté ✅');
            }
            
            saveData();
            closeBookModal();
            renderDashboard();
        }

        // ============================================
        // CLASS CRUD WITH MODAL
        // ============================================
        function openClassModal(classId = null) {
            editingClassId = classId;
            const cls = classId ? state.classes.find(c => c.id === classId) : null;
            
            document.getElementById('modalClassTitle').innerText = cls ? '✏️ Modifier Classe' : '➕ Ajouter une Classe';
            document.getElementById('className').value = cls?.name || '';
            document.getElementById('classLevel').value = cls?.level || 'Primaire';
            
            document.getElementById('classModal').classList.add('open');
        }

        function closeClassModal() {
            document.getElementById('classModal').classList.remove('open');
            editingClassId = null;
        }

        function saveClassFromModal() {
            const name = document.getElementById('className').value.trim();
            if (!name) { showToast('Le nom de la classe est obligatoire', true); return; }
            
            const classData = {
                name: name,
                level: document.getElementById('classLevel').value
            };
            
            if (editingClassId) {
                const index = state.classes.findIndex(c => c.id === editingClassId);
                if (index !== -1) {
                    state.classes[index] = { ...state.classes[index], ...classData };
                    showToast('Classe modifiée ✅');
                }
            } else {
                if (state.classes.find(c => c.name === name)) {
                    showToast('Cette classe existe déjà', true);
                    return;
                }
                classData.id = Date.now();
                state.classes.push(classData);
                showToast('Classe ajoutée ✅');
            }
            
            saveData();
            closeClassModal();
            renderDashboard();
        }

        function deleteStudent(id) {
            const student = state.students.find(s => s.id === id);
            if (student && confirm(`Supprimer définitivement "${student.name}" ?`)) {
                // Return books to stock
                (student.books || []).forEach(bookTitle => {
                    const book = state.books.find(b => b.title === bookTitle);
                    if (book) {
                        book.available = (book.available || 0) + 1;
                        addToHistory(bookTitle, 'retour', 1, student.name, 'Suppression élève');
                    }
                });
                state.students = state.students.filter(s => s.id !== id);
                saveData();
                renderDashboard();
                showToast('Élève supprimé');
            }
        }

        function deleteBook(id) {
            const book = state.books.find(b => b.id === id);
            if (book && confirm(`Supprimer "${book.title}" ?`)) {
                state.books = state.books.filter(b => b.id !== id);
                saveData();
                renderDashboard();
                showToast('Livre supprimé');
            }
        }

        function deleteClass(id) {
            const cls = state.classes.find(c => c.id === id);
            const hasStudents = state.students.some(s => s.class === cls.name);
            if (hasStudents) {
                showToast(`Impossible: ${cls.name} contient des élèves`, true);
                return;
            }
            if (cls && confirm(`Supprimer la classe "${cls.name}" ?`)) {
                state.classes = state.classes.filter(c => c.id !== id);
                saveData();
                renderDashboard();
                showToast('Classe supprimée');
            }
        }

        // ============================================
        // ORDER MANAGEMENT
        // ============================================
        function openOrderModal() {
            document.getElementById('orderBook').innerHTML = '<option value="">-- Sélectionner --</option>' + 
                state.books.map(b => `<option value="${escapeHtml(b.title)}" data-class="${escapeHtml(b.class)}">${escapeHtml(b.title)} (${b.class})</option>`).join('');
            document.getElementById('orderQuantity').value = 0;
            document.getElementById('orderDate').value = new Date().toISOString().slice(0,10);
            document.getElementById('orderModal').classList.add('open');
        }

        function saveOrderFromModal() {
            const bookTitle = document.getElementById('orderBook').value;
            const quantity = parseInt(document.getElementById('orderQuantity').value) || 0;
            const orderDate = document.getElementById('orderDate').value;
            
            if (!bookTitle || quantity <= 0) {
                showToast('Veuillez remplir tous les champs', true);
                return;
            }
            
            const book = state.books.find(b => b.title === bookTitle);
            const newOrder = {
                id: Date.now(),
                bookTitle: bookTitle,
                class: book?.class || '',
                quantity: quantity,
                orderDate: orderDate,
                status: 'en_attente'
            };
            state.orders.push(newOrder);
            addToHistory(bookTitle, 'commande passée', quantity, null, `Commande #${newOrder.id}`);
            saveData();
            closeOrderModal();
            renderDashboard();
            showToast(`Commande de ${quantity} ${bookTitle} enregistrée`);
        }

        function markOrderReceived(orderId) {
            const order = state.orders.find(o => o.id === orderId);
            if (order && order.status === 'en_attente') {
                const book = state.books.find(b => b.title === order.bookTitle);
                if (book) {
                    book.quantity = (book.quantity || 0) + order.quantity;
                    book.available = (book.available || 0) + order.quantity;
                    order.status = 'livré';
                    addToHistory(book.title, 'livraison reçue', order.quantity, null, `Commande #${order.id}`);
                    saveData();
                    renderDashboard();
                    showToast(`Stock mis à jour: +${order.quantity} ${book.title}`);
                }
            }
        }

        function deleteOrder(id) {
            if (confirm('Supprimer cette commande ?')) {
                state.orders = state.orders.filter(o => o.id !== id);
                saveData();
                renderDashboard();
                showToast('Commande supprimée');
            }
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('open');
        }

        // ============================================
        // EXPORT
        // ============================================
        function exportToExcel() {
            const headers = ['Nom', 'Classe', 'Téléphone', 'Date Livraison', 'Payé (DH)', 'Reste (DH)', 'Livres reçus', 'Remarques'];
            const rows = state.students.map(s => [
                s.name, s.class, s.phone || '', s.delivery || '', s.paid || 0, s.remaining || 0,
                (s.books || []).join(', '), s.remarks || ''
            ]);
            const csvRows = [headers, ...rows];
            const csv = csvRows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `export_eleves_${getStoragePrefix()}_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            showToast('Export CSV réussi');
        }

        // ============================================
        // RENDER FUNCTIONS
        // ============================================
        function renderStats() {
            const total = state.students.length;
            const totalPaid = state.students.reduce((s, a) => s + (a.paid || 0), 0);
            const totalRemaining = state.students.reduce((s, a) => s + (a.remaining || 0), 0);
            const fullPaid = state.students.filter(s => s.remaining === 0 && s.paid > 0).length;
            const totalBooks = state.books.reduce((s, b) => s + (b.quantity || 0), 0);
            const lowStockCount = state.books.filter(b => (b.available || 0) < 5).length;
            
            document.getElementById('statTotal').innerHTML = total;
            document.getElementById('statPaid').innerHTML = totalPaid + ' DH';
            document.getElementById('statRemaining').innerHTML = totalRemaining + ' DH';
            document.getElementById('statFullPaid').innerHTML = fullPaid;
            document.getElementById('statBooks').innerHTML = totalBooks;
            document.getElementById('statLowStock').innerHTML = lowStockCount;
            document.getElementById('statLowStock').parentElement.style.borderBottomColor = lowStockCount > 0 ? '#e74c3c' : '#2ecc71';
        }

        function renderStudents() {
            const search = (document.getElementById('studentSearch')?.value || '').toLowerCase();
            const classFilter = document.getElementById('classFilterSelect')?.value || 'all';
            let filtered = state.students.filter(s => {
                const matchSearch = s.name.toLowerCase().includes(search);
                const matchClass = classFilter === 'all' || s.class === classFilter;
                const isPaid = (s.remaining === 0 && s.paid > 0);
                const matchFilter = currentFilter === 'all' || (currentFilter === 'paid' && isPaid) || (currentFilter === 'unpaid' && !isPaid);
                return matchSearch && matchClass && matchFilter;
            });
            const tbody = document.getElementById('studentsTbody');
            document.getElementById('studentCounter').innerText = `${filtered.length} élève(s)`;
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="empty-state">Aucun élève trouvé</div></td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map((s, idx) => {
                const isPaid = s.remaining === 0 && s.paid > 0;
                return `<tr>
                    <td style="color:#6c757d">${idx + 1}</td>
                    <td><strong>${escapeHtml(s.name)}</strong></td>
                    <td><span class="class-chip">${escapeHtml(s.class)}</span></td>
                    <td>${s.books?.length || 0}</td>
                    <td style="color:#a3e9b4">${s.paid || 0} DH</td>
                    <td style="color:${s.remaining > 0 ? '#ffb3b3' : '#6c757d'}">${s.remaining || 0} DH</td>
                    <td>${s.delivery || '—'}</td>
                    <td>${s.phone || '—'}</td>
                    <td>${isPaid ? '<span class="badge-paid">Payé</span>' : '<span class="badge-unpaid">En attente</span>'}</td>
                    <td class="action-btns">
                        <button class="btn-icon" onclick="openStudentModal(${s.id})">✏️</button>
                        <button class="btn-icon" onclick="deleteStudent(${s.id})">🗑️</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function renderBooks() {
            const search = (document.getElementById('bookSearch')?.value || '').toLowerCase();
            let filtered = state.books.filter(b => b.title.toLowerCase().includes(search));
            const tbody = document.getElementById('booksTbody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Aucun livre</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map((b, idx) => `
                <tr>
                    <td style="color:#6c757d">${idx + 1}</td>
                    <td><strong>${escapeHtml(b.title)}</strong></td>
                    <td><span class="class-chip">${escapeHtml(b.class)}</span></td>
                    <td>${escapeHtml(b.type)}</td>
                    <td>${b.quantity || 0}</td>
                    <td class="${(b.available || 0) < 5 ? 'lowstock' : ''}">${b.available || 0}</td>
                    <td>${b.price || 0} DH</td>
                    <td class="action-btns">
                        <button class="btn-icon" onclick="openBookModal(${b.id})">✏️</button>
                        <button class="btn-icon" onclick="deleteBook(${b.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderClasses() {
            const tbody = document.getElementById('classesTbody');
            if (state.classes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Aucune classe</td></tr>';
                return;
            }
            tbody.innerHTML = state.classes.map((c, idx) => {
                const studentCount = state.students.filter(s => s.class === c.name).length;
                const bookCount = state.books.filter(b => b.class === c.name).length;
                return `<tr>
                    <td style="color:#6c757d">${idx + 1}</td>
                    <td><strong>${escapeHtml(c.name)}</strong></td>
                    <td>${escapeHtml(c.level)}</td>
                    <td>${studentCount}</td>
                    <td>${bookCount}</td>
                    <td class="action-btns">
                        <button class="btn-icon" onclick="openClassModal(${c.id})">✏️</button>
                        <button class="btn-icon" onclick="deleteClass(${c.id})">🗑️</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function renderStock() {
            const ordersTbody = document.getElementById('ordersTbody');
            if (state.orders.length === 0) {
                ordersTbody.innerHTML = '<tr><td colspan="7" class="empty-state">Aucune commande</div></td></tr>';
            } else {
                ordersTbody.innerHTML = state.orders.map((o, idx) => `
                    <tr>
                        <td style="color:#6c757d">${idx + 1}</div></td>
                        <td>${escapeHtml(o.bookTitle)}</div><td>
                        <td><span class="class-chip">${escapeHtml(o.class)}</span></td>
                        <td>${o.quantity}</div><td>
                        <td>${o.orderDate || '—'}</div></td>
                        <td class="${o.status === 'en_attente' ? 'status-warning' : 'status-success'}">${o.status === 'en_attente' ? '⏳ En attente' : '✅ Livré'}</div></td>
                        <td class="action-btns">
                            ${o.status === 'en_attente' ? `<button class="btn-icon success" onclick="markOrderReceived(${o.id})">📦 Recevoir</button>` : ''}
                            <button class="btn-icon" onclick="deleteOrder(${o.id})">🗑️</button>
                        </div></td>
                    </tr>
                `).join('');
            }
            const historyTbody = document.getElementById('historyTbody');
            const recent = state.history.slice(0, 50);
            if (recent.length === 0) {
                historyTbody.innerHTML = '<tr><td colspan="6" class="empty-state">Aucun mouvement</div></td></tr>';
            } else {
                historyTbody.innerHTML = recent.map((h, idx) => `
                    <tr>
                        <td style="color:#6c757d">${idx + 1}</div></td>
                        <td>${h.date}</div></td>
                        <td>${escapeHtml(h.bookTitle)}</div></td>
                        <td>${h.action}</div></td>
                        <td class="${h.quantity < 0 ? 'lowstock' : ''}">${h.quantity > 0 ? '+' : ''}${h.quantity}</div></td>
                        <td>${h.studentName || '—'}</div></td>
                    </tr>
                `).join('');
            }
            const lowStockItems = state.books.filter(b => (b.available || 0) < 5);
            const alertDiv = document.getElementById('lowStockAlert');
            if (lowStockItems.length) {
                alertDiv.innerHTML = `<div style="background:#631d1d; padding:0.5rem 1rem; border-radius:2rem; margin-bottom:1rem;">⚠️ Stock faible : ${lowStockItems.map(b => `${b.title} (${b.available} restants)`).join(', ')}</div>`;
            } else {
                alertDiv.innerHTML = '<div style="background:#1f4f2d; padding:0.5rem 1rem; border-radius:2rem; margin-bottom:1rem;">✅ Tous les stocks sont suffisants</div>';
            }
        }

        function renderDashboard() {
            const schoolDisplay = currentUser.role === 'admin' ? '🌍 Toutes les écoles' : SCHOOLS[currentUser.school]?.name || currentUser.school;
            const container = document.getElementById('appContainer');
            container.innerHTML = `
                <div class="app-header">
                    <div class="logo-area">
                        <h2>🎓 Centre d'Apprentissage</h2>
                        <p>${escapeHtml(schoolDisplay)} | ${currentUser.role === 'admin' ? 'Super Admin' : currentUser.role === 'school_admin' ? 'Administrateur' : 'Enseignant'}</p>
                    </div>
                    <div class="user-panel">
                        <span class="badge">👤 ${escapeHtml(currentUser.name)}</span>
                        <button id="logoutBtn" class="outline">🚪 Déconnexion</button>
                        <button id="exportBtn" class="primary">📥 Exporter CSV</button>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div>📚 Élèves</div></div>
                    <div class="stat-card"><div class="stat-number green" id="statPaid">0</div><div>💰 Montant Reçu</div></div>
                    <div class="stat-card"><div class="stat-number red" id="statRemaining">0</div><div>⏳ Reste à percevoir</div></div>
                    <div class="stat-card"><div class="stat-number" id="statFullPaid">0</div><div>✅ Payé intégralement</div></div>
                    <div class="stat-card"><div class="stat-number" id="statBooks">0</div><div>📖 Livres</div></div>
                    <div class="stat-card"><div class="stat-number" id="statLowStock">0</div><div>⚠️ Stock faible</div></div>
                </div>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="students">📚 Élèves</button>
                    <button class="tab-btn" data-tab="books">📖 Livres</button>
                    <button class="tab-btn" data-tab="classes">🏫 Classes</button>
                    <button class="tab-btn" data-tab="stock">📦 Stock & Commandes</button>
                </div>
                <div id="panel-students" class="panel active">
                    <div class="toolbar">
                        <input type="text" id="studentSearch" class="search-input" placeholder="🔍 Rechercher un élève...">
                        <select id="classFilterSelect" class="filter-select"><option value="all">📚 Toutes les classes</option></select>
                        <button id="filterAllBtn" class="btn-like">Tous</button>
                        <button id="filterPaidBtn" class="btn-like success">✅ Payés</button>
                        <button id="filterUnpaidBtn" class="btn-like danger">⚠️ Non-payés</button>
                        <button id="addStudentBtn" class="primary">+ Ajouter Élève</button>
                        <span id="studentCounter" class="count-label"></span>
                    </div>
                    <div class="table-wrap"><table><thead><tr><th>#</th><th>Nom</th><th>Classe</th><th>Livres</th><th>Payé</th><th>Reste</th><th>Livraison</th><th>Tél</th><th>Statut</th><th>Actions</th></tr></thead><tbody id="studentsTbody"></tbody></table></div>
                </div>
                <div id="panel-books" class="panel">
                    <div class="toolbar">
                        <input type="text" id="bookSearch" class="search-input" placeholder="🔍 Rechercher un livre...">
                        <button id="addBookBtn" class="primary">+ Ajouter Livre</button>
                    </div>
                    <div class="table-wrap"><table><thead><tr><th>#</th><th>Titre</th><th>Classe</th><th>Type</th><th>Qté totale</th><th>Disponible</th><th>Prix (DH)</th><th>Actions</th></tr></thead><tbody id="booksTbody"></tbody></table></div>
                </div>
                <div id="panel-classes" class="panel">
                    <div class="toolbar"><button id="addClassBtn" class="primary">+ Ajouter Classe</button></div>
                    <div class="table-wrap"><table><thead><tr><th>#</th><th>Classe</th><th>Niveau</th><th>Élèves</th><th>Livres</th><th>Actions</th></tr></thead><tbody id="classesTbody"></tbody></table></div>
                </div>
                <div id="panel-stock" class="panel">
                    <div id="lowStockAlert"></div>
                    <div class="toolbar"><button id="addOrderBtn" class="primary">+ Nouvelle Commande</button><button id="refreshStockBtn" class="outline">🔄 Actualiser</button></div>
                    <h4 style="margin-top:1rem">📋 Commandes en cours</h4>
                    <div class="table-wrap"><table><thead><tr><th>#</th><th>Livre</th><th>Classe</th><th>Qté</th><th>Date</th><th>Statut</th><th>Actions</th></tr></thead><tbody id="ordersTbody"></tbody></table></div>
                    <h4 style="margin-top:1rem">📜 Historique des mouvements</h4>
                    <div class="table-wrap"><table><thead><tr><th>#</th><th>Date</th><th>Livre</th><th>Action</th><th>Qté</th><th>Élève</th></tr></thead><tbody id="historyTbody"></tbody></table></div>
                </div>
            `;
            
            // Event listeners
            document.getElementById('logoutBtn').onclick = () => { sessionStorage.removeItem('currentUser'); window.location.href = 'index.html'; };
            document.getElementById('exportBtn').onclick = () => exportToExcel();
            document.getElementById('addStudentBtn').onclick = () => openStudentModal();
            document.getElementById('addBookBtn').onclick = () => openBookModal();
            document.getElementById('addClassBtn').onclick = () => openClassModal();
            document.getElementById('addOrderBtn').onclick = () => openOrderModal();
            document.getElementById('refreshStockBtn').onclick = () => renderDashboard();
            document.getElementById('filterAllBtn').onclick = () => { currentFilter = 'all'; renderStudents(); };
            document.getElementById('filterPaidBtn').onclick = () => { currentFilter = 'paid'; renderStudents(); };
            document.getElementById('filterUnpaidBtn').onclick = () => { currentFilter = 'unpaid'; renderStudents(); };
            document.getElementById('studentSearch').oninput = () => renderStudents();
            document.getElementById('bookSearch').oninput = () => renderBooks();
            document.getElementById('classFilterSelect').onchange = () => renderStudents();
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                    document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');
                    if (btn.dataset.tab === 'students') renderStudents();
                    if (btn.dataset.tab === 'books') renderBooks();
                    if (btn.dataset.tab === 'classes') renderClasses();
                    if (btn.dataset.tab === 'stock') renderStock();
                };
            });
            
            // Update class filter dropdown
            const uniqueClasses = [...new Set(state.students.map(s => s.class))];
            const filterSelect = document.getElementById('classFilterSelect');
            const currentVal = filterSelect.value;
            filterSelect.innerHTML = '<option value="all">📚 Toutes les classes</option>' + uniqueClasses.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
            if (uniqueClasses.includes(currentVal)) filterSelect.value = currentVal;
            
            renderStats();
            renderStudents();
            renderBooks();
            renderClasses();
            renderStock();
        }

        // ============================================
        // MODAL HTML INJECTION
        // ============================================
        function injectModals() {
            const modalHTML = `
                <div id="studentModal" class="modal"><div class="modal-card"><h3 id="modalStudentTitle">Ajouter un Élève</h3>
                    <div class="form-row"><div class="form-field full"><label>Nom complet</label><input type="text" id="studentName" placeholder="Prénom Nom"></div></div>
                    <div class="form-row"><div class="form-field"><label>Classe</label><select id="studentClass"></select></div><div class="form-field"><label>Téléphone</label><input type="tel" id="studentPhone" placeholder="06XXXXXXXX"></div></div>
                    <div class="form-row"><div class="form-field"><label>Date livraison</label><input type="date" id="studentDelivery"></div></div>
                    <div class="form-row"><div class="form-field"><label>Montant payé (DH)</label><input type="number" id="studentPaid" value="0"></div><div class="form-field"><label>Reste à payer (DH)</label><input type="number" id="studentRemaining" value="0"></div></div>
                    <div class="form-field"><label>Livres reçus</label><div id="studentBooksList" class="checkbox-group"></div></div>
                    <div class="form-field"><label>Remarques</label><textarea id="studentRemarks" rows="2"></textarea></div>
                    <div class="action-btns" style="margin-top:1rem"><button class="outline" onclick="closeStudentModal()">Annuler</button><button class="primary" onclick="saveStudentFromModal()">💾 Enregistrer</button></div>
                </div></div>
                <div id="bookModal" class="modal"><div class="modal-card"><h3 id="modalBookTitle">Ajouter un Livre</h3>
                    <div class="form-field"><label>Titre</label><input type="text" id="bookTitle" placeholder="Titre du livre"></div>
                    <div class="form-row"><div class="form-field"><label>Classe</label><select id="bookClass"></select></div><div class="form-field"><label>Type</label><select id="bookType">${BOOK_TYPES.map(t => `<option>${t}</option>`).join('')}</select></div></div>
                    <div class="form-row"><div class="form-field"><label>Quantité totale</label><input type="number" id="bookQuantity" value="0"></div><div class="form-field"><label>Disponible</label><input type="number" id="bookAvailable" value="0"></div></div>
                    <div class="form-field"><label>Prix unitaire (DH)</label><input type="number" id="bookPrice" value="0"></div>
                    <div class="action-btns" style="margin-top:1rem"><button class="outline" onclick="closeBookModal()">Annuler</button><button class="primary" onclick="saveBookFromModal()">💾 Enregistrer</button></div>
                </div></div>
                <div id="classModal" class="modal"><div class="modal-card"><h3 id="modalClassTitle">Ajouter une Classe</h3>
                    <div class="form-field"><label>Nom de la classe</label><input type="text" id="className" placeholder="Ex: CP, 6ème, 2nde..."></div>
                    <div class="form-field"><label>Niveau</label><select id="classLevel"><option>Primaire</option><option>Collège</option><option>Lycée</option></select></div>
                    <div class="action-btns" style="margin-top:1rem"><button class="outline" onclick="closeClassModal()">Annuler</button><button class="primary" onclick="saveClassFromModal()">💾 Enregistrer</button></div>
                </div></div>
                <div id="orderModal" class="modal"><div class="modal-card"><h3>📦 Nouvelle Commande</h3>
                    <div class="form-field"><label>Livre</label><select id="orderBook"></select></div>
                    <div class="form-row"><div class="form-field"><label>Quantité</label><input type="number" id="orderQuantity" value="0"></div><div class="form-field"><label>Date commande</label><input type="date" id="orderDate"></div></div>
                    <div class="action-btns" style="margin-top:1rem"><button class="outline" onclick="closeOrderModal()">Annuler</button><button class="primary" onclick="saveOrderFromModal()">💾 Commander</button></div>
                </div></div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        // ============================================
        // INITIALIZE
        // ============================================
        loadData();
        injectModals();
        renderDashboard();
        
        // Expose functions globally
        window.openStudentModal = openStudentModal;
        window.closeStudentModal = closeStudentModal;
        window.saveStudentFromModal = saveStudentFromModal;
        window.openBookModal = openBookModal;
        window.closeBookModal = closeBookModal;
        window.saveBookFromModal = saveBookFromModal;
        window.openClassModal = openClassModal;
        window.closeClassModal = closeClassModal;
        window.saveClassFromModal = saveClassFromModal;
        window.openOrderModal = openOrderModal;
        window.closeOrderModal = closeOrderModal;
        window.saveOrderFromModal = saveOrderFromModal;
        window.markOrderReceived = markOrderReceived;
        window.deleteOrder = deleteOrder;
        window.deleteStudent = deleteStudent;
        window.deleteBook = deleteBook;
        window.deleteClass = deleteClass;
        window.exportToExcel = exportToExcel;
    </script>
</body>
</html>
