<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centre d'Apprentissage - Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f13 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: #1e1e28;
            border: 1px solid #2e2e3e;
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            max-width: 90%;
        }
        .login-container h1 {
            font-size: 28px;
            color: #f5a623;
            text-align: center;
            margin-bottom: 10px;
        }
        .login-container .subtitle {
            text-align: center;
            color: #7a7a9a;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: #7a7a9a;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f13;
            border: 1px solid #2e2e3e;
            border-radius: 10px;
            color: #f0f0f5;
            font-size: 14px;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #f5a623;
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-login:hover { background: #ffb84d; }
        .error-message {
            background: #3a1a1a;
            color: #f87171;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
            display: none;
        }
        .demo-credentials {
            background: #17171f;
            border-radius: 10px;
            padding: 15px;
            margin-top: 25px;
        }
        .demo-credentials h4 { color: #f5a623; margin-bottom: 10px; font-size: 13px; }
        .demo-credentials p { font-size: 11px; color: #7a7a9a; margin: 5px 0; }
        code { background: #0f0f13; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🎓 Centre d'Apprentissage</h1>
        <div class="subtitle">Multi-écoles - Gestion des Élèves & Livres</div>
        
        <div id="errorMsg" class="error-message"></div>
        
        <div class="form-group">
            <label>👤 Nom d'utilisateur</label>
            <input type="text" id="username" placeholder="Entrez votre nom d'utilisateur">
        </div>
        
        <div class="form-group">
            <label>🔒 Mot de passe</label>
            <input type="password" id="password" placeholder="Entrez votre mot de passe">
        </div>
        
        <button class="btn-login" onclick="handleLogin()">Se connecter</button>
        
        <div class="demo-credentials">
            <h4>📋 Comptes de démonstration</h4>
            <p><code>admin</code> / <code>admin123</code> - Accès complet</p>
            <p><code>l1_admin</code> / <code>l1pass</code> - Admin L1 (Primaire)</p>
            <p><code>l2_admin</code> / <code>l2pass</code> - Admin L2 (Collège)</p>
            <p><code>l3_admin</code> / <code>l3pass</code> - Admin L3 (Lycée)</p>
            <p><code>l1_teacher</code> / <code>teacher</code> - Professeur L1</p>
        </div>
    </div>

    <script>
        // Simple auth without external files first
        const USERS = [
            { username: 'admin', password: 'admin123', role: 'admin', school: null, name: 'Administrateur' },
            { username: 'l1_admin', password: 'l1pass', role: 'school_admin', school: 'L1', name: 'Admin L1' },
            { username: 'l2_admin', password: 'l2pass', role: 'school_admin', school: 'L2', name: 'Admin L2' },
            { username: 'l3_admin', password: 'l3pass', role: 'school_admin', school: 'L3', name: 'Admin L3' },
            { username: 'l1_teacher', password: 'teacher', role: 'teacher', school: 'L1', name: 'Prof L1' }
        ];
        
        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            if (!username || !password) {
                errorDiv.textContent = 'Veuillez entrer vos identifiants';
                errorDiv.style.display = 'block';
                return;
            }
            
            const user = USERS.find(u => u.username === username && u.password === password);
            
            if (user) {
                // Store user in session
                sessionStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'dashboard.html';
            } else {
                errorDiv.textContent = 'Nom d\'utilisateur ou mot de passe incorrect';
                errorDiv.style.display = 'block';
            }
        }
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
