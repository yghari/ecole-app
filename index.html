<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centre d'Apprentissage - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #0f0f13 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: #1e1e28;
            border: 1px solid #2e2e3e;
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            max-width: 90%;
        }
        .login-container h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #f5a623;
            text-align: center;
            margin-bottom: 10px;
        }
        .login-container .subtitle {
            text-align: center;
            color: #7a7a9a;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: #7a7a9a;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f13;
            border: 1px solid #2e2e3e;
            border-radius: 10px;
            color: #f0f0f5;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #7c6aff;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #f5a623;
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-login:hover { background: #ffb84d; transform: translateY(-1px); }
        .error-message {
            background: #3a1a1a;
            color: #f87171;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
            display: none;
        }
        .demo-credentials {
            background: #17171f;
            border-radius: 10px;
            padding: 15px;
            margin-top: 25px;
        }
        .demo-credentials h4 { color: #f5a623; margin-bottom: 10px; font-size: 13px; }
        .demo-credentials p { font-size: 11px; color: #7a7a9a; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🎓 Centre d'Apprentissage</h1>
        <div class="subtitle">Multi-écoles - Gestion des Élèves & Livres</div>
        
        <div id="errorMsg" class="error-message"></div>
        
        <div class="form-group">
            <label>👤 Nom d'utilisateur</label>
            <input type="text" id="username" placeholder="Entrez votre nom d'utilisateur">
        </div>
        
        <div class="form-group">
            <label>🔒 Mot de passe</label>
            <input type="password" id="password" placeholder="Entrez votre mot de passe">
        </div>
        
        <button class="btn-login" onclick="handleLogin()">Se connecter</button>
        
        <div class="demo-credentials">
            <h4>📋 Comptes de démonstration</h4>
            <p><strong>admin</strong> / admin123 - Accès complet</p>
            <p><strong>l1_admin</strong> / l1pass - Admin L1 (Primaire)</p>
            <p><strong>l2_admin</strong> / l2pass - Admin L2 (Collège)</p>
            <p><strong>l3_admin</strong> / l3pass - Admin L3 (Lycée)</p>
            <p><strong>l1_teacher</strong> / teacher - Professeur L1</p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            if (!username || !password) {
                errorDiv.textContent = 'Veuillez entrer vos identifiants';
                errorDiv.style.display = 'block';
                return;
            }
            
            const result = login(username, password);
            
            if (result.success) {
                window.location.href = 'dashboard.html';
            } else {
                errorDiv.textContent = result.error;
                errorDiv.style.display = 'block';
            }
        }
        
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
